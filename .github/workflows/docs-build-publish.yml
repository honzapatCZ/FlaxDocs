name: Build Documentation

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-18.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: Checkout live docs repo
        uses: actions/checkout@v2
        with:
          repository: honzapatCZ/flaxdocs-host
          path: _site
          fetch-depth: 1

      - name: Clear live docs repo
        run: rm -rf _site/*

      - name: Get mono
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys 3FA7E0328081BFF6A14DA29AA6A19B38D3D831EF
          sudo sh -c 'echo "deb https://download.mono-project.com/repo/ubuntu stable-bionic main" > /etc/apt/sources.list.d/mono-official-stable.list'
          sudo apt-get update
          sudo apt-get install mono-complete --yes

      - name: Get docfx
        run: |
          curl -L https://github.com/dotnet/docfx/releases/latest/download/docfx.zip -o docfx.zip
          unzip -d .docfx docfx.zip

      - name: Build docs
        run: mono .docfx/docfx.exe
        
      - name: Pushes to another repository
        uses: cpina/github-action-push-to-another-repository@master
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          source-directory: '_site'
          destination-github-username: 'honzapatCZ'
          destination-repository-name: 'flaxdocs-host'
          user-email: nejcraftplays+flaxdocs@gmail.com
